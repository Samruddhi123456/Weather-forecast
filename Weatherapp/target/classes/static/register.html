<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register - Weather Vista</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://kit.fontawesome.com/7a4b62b0a4.js"
            crossorigin="anonymous"></script>

</head>

<body class="login-body">

<div class="login-container">

    <div class="login-card">

        <h1>
            <i class="fa-solid fa-user-plus"></i>
            Create Account
        </h1>

        <p class="welcome">
            Join Weather Vista 🌤
        </p>

        <input type="text"
               id="registerUsername"
               placeholder="👤 Username">

        <input type="password"
               id="registerPassword"
               placeholder="🔒 Password">

        <button onclick="register()">
            ✨ Register
        </button>

        <p class="switch-page">

            Already have account?

            <a href="login.html">
                Login
            </a>

        </p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
