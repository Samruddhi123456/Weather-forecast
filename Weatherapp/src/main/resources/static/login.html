<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login - Weather Vista</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://kit.fontawesome.com/7a4b62b0a4.js"
            crossorigin="anonymous"></script>

</head>

<body class="login-body">

<div class="login-container">

    <div class="login-card">

        <h1>
            <i class="fa-solid fa-cloud-sun"></i>
            Weather Vista
        </h1>

        <p class="welcome">
            Welcome Back 👋
        </p>

        <input type="text"
               id="loginUsername"
               placeholder="👤 Username">

        <input type="password"
               id="loginPassword"
               placeholder="🔒 Password">

        <button onclick="login()">
            🚀 Login
        </button>

        <p class="switch-page">

            Don't have account?

            <a href="register.html">
                Register
            </a>

        </p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
